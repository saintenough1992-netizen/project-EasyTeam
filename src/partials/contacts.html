<section class="section" id="contact-us">
  <div class="container contact-us">
    <div class="contact-us-content-left">
      <svg id="icon-decoration" height="20" width="300">
        <use href="../img/icons.svg#icon-decoration"></use>
      </svg>
      <h2 class="contact-us-title">Let's Tell Your Story</h2>
      <p class="contact-us-text">
        I can't wait to hear more about your wedding! Tell me about your plans,
        and I'll be in touch to discuss how we can create magic together.
      </p>
      <address class="contact-us-address">
        <ul class="contact-us-address-list">
          <li class="contact-us-address-list-item">
            <svg id="icon-mail" height="24" width="24">
              <use href="../img/icons.svg#icon-mail"></use>
            </svg>
            <a href="">info@mariakovalenko.com</a>
          </li>
          <li class="contact-us-address-list-item">
            <svg id="icon-call" height="24" width="24">
              <use href="../img/icons.svg#icon-call"></use>
            </svg>
            <a href="">+40 (555) 123-4567</a>
          </li>
          <li class="contact-us-address-list-item">
            <svg id="icon-location" height="24" width="24">
              <use href="../img/icons.svg#icon-location"></use>
            </svg>
            <p>Raschdorffstraße 2-26, 13409 Berlin, Germany</p>
          </li>
        </ul>
      </address>
    </div>
    <div class="contact-us-content-right">
      <form action="" method="post" id="contact-form">
        <label for="name-input" class="form-label">Name* </label>
        <input
          type="text"
          name="name-input"
          id="name-input"
          placeholder="Maria"
          required
        />
        <label for="phone-input" class="form-label"> Phone* </label>
        <input
          type="tel"
          name="phone-input"
          id="phone-input"
          placeholder="380991234578"
          pattern="/^[0-9]{12}$/"
          required
        />
        <label for="message-input" class="form-label"> Message </label>
        <textarea
          name="message-input"
          id="message-input"
          rows="8"
          placeholder="Tell me a little about you and your special day. Don't forget to include your wedding date, venue, and what you're most excited about..."
        ></textarea>
        <button type="submit" class="btn-submit">Let's Talk</button>
      </form>
    </div>
  </div>
</section>
